version: '3.8'

services:
  grabha-api:
    image: sreeh007/grabha-api:latest
    container_name: grabha-api
    restart: always
    ports:
      - "5000:5000"
    volumes:
      # app.py writes logs to ~/grabha/logs which is /root/grabha/logs inside the container
      - grabha-logs:/root/grabha/logs
      # cookies are managed on the host and mounted read-only into the container
      - /home/sreeh007/grabha-cookies:/app/cookies:ro
    environment:
      - PORT=5000
      # Optional overrides — set these in a .env file on the server if needed:
      # - ADMIN_PASSWORD=your-password
      # - TOKEN_SECRET=your-secret

volumes:
  grabha-logs:
